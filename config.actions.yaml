# ─────────────────────────────────────────────────────────────────────────────
#  Конфиг для запуска в GitHub Actions (Вариант А: сессия по кнопке).
#  Здесь НЕТ секретов — ключ и токены приходят из GitHub Actions Secrets
#  в переменные окружения (см. .github/workflows/brainstorm.yml).
#  Workflow копирует этот файл в config.yaml перед запуском.
# ─────────────────────────────────────────────────────────────────────────────

llm:
  api_key: ""                                  # берётся из env GROQ_API_KEY (секрет)
  base_url: "https://api.groq.com/openai/v1"   # Groq (бесплатно)

boss:
  username: "MaksimXyila"     # без @
  telegram_id: 5426581017     # числовой id

discussion:
  max_rounds: 3
  delay_seconds: 3
  max_message_chars: 450        # короче = живее и проще
  language: "русский"
  typing: true
  stream: true
  edit_interval_seconds: 1.2
  react_on_seen: true
  seen_emoji: "👀"
  # ── Лидер-режим и голосование ──
  leader_name: "Стратег"        # старший/командир
  directed_rounds: 2            # кругов обсуждения после команды «погнали»
  voting: true                  # решения — голосованием, большинство побеждает
  # слова-команды Босса, по которым лидер раздаёт задачи (можно менять):
  go_words: ["делаем", "делайте", "поехали", "погнали", "вперёд", "го",
             "приступаем", "приступайте", "стартуем", "начинаем", "за дело",
             "действуйте", "решаем", "запускаем"]

moderator:
  model: "llama-3.1-8b-instant"

# token_env — имя секрета/переменной окружения с токеном бота
# (telegram_token оставляем пустым; токен придёт из env).
bots:
  - name: "Стратег"
    token_env: "BOT_TOKEN_STRATEG"
    telegram_token: ""
    model: "openai/gpt-oss-120b"
    listener: true
    persona: >
      Ты — Стратег, старший в команде. Видишь идею целиком и раскладываешь её на
      простые шаги. Говоришь спокойно и понятно, без умных слов.

  - name: "Креатор"
    token_env: "BOT_TOKEN_KREATOR"
    telegram_token: ""
    model: "llama-3.3-70b-versatile"
    persona: >
      Ты — Креатор. Фонтанируешь идеями и фишками, предлагаешь «а давай вот так».
      Энергичный, говоришь живо и по-простому.

  - name: "Критик"
    token_env: "BOT_TOKEN_KRITIK"
    telegram_token: ""
    model: "qwen/qwen3-32b"
    persona: >
      Ты — Критик. Замечаешь слабые места и говоришь о них прямо, но по-доброму:
      сразу подсказываешь, как поправить. Без занудства, простыми словами.

  - name: "Реалист"
    token_env: "BOT_TOKEN_REALIST"
    telegram_token: ""
    model: "openai/gpt-oss-20b"
    persona: >
      Ты — Реалист. Смотришь, что реально сделать: время, деньги, силы. Отсекаешь
      лишнее, оставляешь рабочее. Говоришь просто и по делу.
