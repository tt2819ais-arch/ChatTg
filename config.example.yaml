# ─────────────────────────────────────────────────────────────────────────────
#  Конфигурация мульти-агентного брейншторма в Telegram
#  Скопируй этот файл в config.yaml и впиши свои значения.
#    cp config.example.yaml config.yaml
#
#  Ключ модели можно задать здесь ИЛИ в .env (рекомендуется в .env).
#  Значение из переменной окружения (.env) имеет приоритет.
#
#  ПРОВАЙДЕР МОДЕЛЕЙ. Код OpenAI-совместимый, поэтому работает и с OpenRouter,
#  и с Groq — отличаются только base_url, ключ и id моделей. Секцию можно
#  назвать "llm" (нейтрально) или "openrouter" (старое имя) — читается любая.
# ─────────────────────────────────────────────────────────────────────────────

llm:
  # ── Вариант A: OpenRouter ──────────────────────────────────────────────────
  # Ключ: https://openrouter.ai/keys  (в .env: OPENROUTER_API_KEY=...)
  # Для :free моделей включи тумблер на https://openrouter.ai/settings/privacy
  #   («Free endpoints that may train…»), иначе будет 404. Free-лимиты жёсткие →
  #   с 4 ботами легко словить 429.
  api_key: ""                                   # или возьмётся из .env
  base_url: "https://openrouter.ai/api/v1"
  http_referer: "https://t.me/your_brainstorm_bot"   # OpenRouter любит этот заголовок
  app_title: "Telegram Brainstorm Bots"

  # ── Вариант B: Groq (бесплатно + быстро, рекомендуется) ─────────────────────
  # Ключ: https://console.groq.com/keys  (в .env: GROQ_API_KEY=...)
  # Просто поменяй base_url на строку ниже и используй Groq-id моделей (см. ботов):
  # base_url: "https://api.groq.com/openai/v1"

# Босс — его указания выполняются в первую очередь, любой его ответ выше мнения ботов.
boss:
  username: "MaksimXyila"     # без @
  telegram_id: 5426581017     # числовой id (узнать у @userinfobot)

# ─────────────────────────────────────────────────────────────────────────────
#  Параметры обсуждения (контроль цикла — чтобы не заспамить чат и лимиты)
# ─────────────────────────────────────────────────────────────────────────────
discussion:
  max_rounds: 3              # сколько кругов высказываний на одну тему
  delay_seconds: 3           # пауза между сообщениями ботов (анти-спам / анти-rate-limit)
  max_message_chars: 450     # ботам велим писать кратко и просто (короче = живее)
  language: "русский"        # язык обсуждения

  # ── Лидер-режим и голосование ───────────────────────────────────────────────
  leader_name: "Стратег"     # старший/командир; раздаёт задачи по команде «погнали»
  directed_rounds: 2         # кругов обсуждения после команды Босса
  voting: true               # решения принимаются голосованием (большинство побеждает)
  # слова-команды Босса, по которым лидер берёт командование (можно дополнять):
  go_words: ["делаем", "делайте", "поехали", "погнали", "вперёд", "го",
             "приступаем", "приступайте", "стартуем", "начинаем", "за дело",
             "действуйте", "решаем", "запускаем"]

  # ── Анимация и реакции ──────────────────────────────────────────────────────
  typing: true               # показывать «печатает…» (sendChatAction) пока бот думает
  stream: true               # печатать ответ постепенно (editMessageText по мере генерации)
  edit_interval_seconds: 1.2 # как часто обновлять текст при стриме (НЕ чаще ~1с — лимиты Telegram)
  react_on_seen: true        # боты ставят реакцию на сообщение Босса, что «увидели» его
  seen_emoji: "👀"            # эмодзи-реакция (должно быть из списка разрешённых Telegram)
  # NB: sendMessageDraft (черновик-стриминг) РАБОТАЕТ ТОЛЬКО В ЛИЧНЫХ ЧАТАХ,
  #     в группах Telegram отдаёт TEXTDRAFT_PEER_INVALID — поэтому в группе
  #     используется typing + постепенный edit (визуально тот же эффект «печати»).

# Модель-«модератор»: решает после каждого круга — продолжать / спросить босса / финал.
# Бери быструю и дешёвую/бесплатную модель.
moderator:
  # OpenRouter: "openai/gpt-oss-120b:free"   |   Groq: "llama-3.1-8b-instant"
  model: "llama-3.1-8b-instant"

# ─────────────────────────────────────────────────────────────────────────────
#  Боты. Нужно 4 разных Telegram-бота → 4 токена у @BotFather.
#  model — id из выбранного провайдера. Списки моделей МЕНЯЮТСЯ:
#    OpenRouter (бесплатные): https://openrouter.ai/models?max_price=0   (суффикс :free)
#    Groq (актуальные id):    https://console.groq.com/docs/models
#  Ниже модели Groq (вариант B). Закомментированы рабочие :free аналоги OpenRouter.
# ─────────────────────────────────────────────────────────────────────────────
bots:
  - name: "Стратег"
    telegram_token: "PASTE_TELEGRAM_BOT_TOKEN_1"
    model: "openai/gpt-oss-120b"            # OpenRouter: "openai/gpt-oss-120b:free"
    listener: true            # ровно ОДИН бот слушает сообщения группы (этого достаточно)
    persona: >
      Ты — Стратег, старший в команде. Видишь идею целиком и раскладываешь её на
      простые шаги. Говоришь спокойно и понятно, без умных слов.

  - name: "Креатор"
    telegram_token: "PASTE_TELEGRAM_BOT_TOKEN_2"
    model: "llama-3.3-70b-versatile"        # OpenRouter: "meta-llama/llama-3.3-70b-instruct:free"
    persona: >
      Ты — Креатор. Фонтанируешь идеями и фишками, предлагаешь «а давай вот так».
      Энергичный, говоришь живо и по-простому.

  - name: "Критик"
    telegram_token: "PASTE_TELEGRAM_BOT_TOKEN_3"
    model: "qwen/qwen3-32b"                 # OpenRouter: "z-ai/glm-4.5-air:free"
    persona: >
      Ты — Критик. Замечаешь слабые места и говоришь о них прямо, но по-доброму:
      сразу подсказываешь, как поправить. Без занудства, простыми словами.

  - name: "Реалист"
    telegram_token: "PASTE_TELEGRAM_BOT_TOKEN_4"
    model: "openai/gpt-oss-20b"             # OpenRouter: "qwen/qwen3-next-80b-a3b-instruct:free"
    persona: >
      Ты — Реалист. Смотришь, что реально сделать: время, деньги, силы. Отсекаешь
      лишнее, оставляешь рабочее. Говоришь просто и по делу.
